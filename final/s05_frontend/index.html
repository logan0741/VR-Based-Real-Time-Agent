<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Pose Viewer — Real-Time Skeleton</title>
    <meta name="description" content="Real-time 2D skeleton visualization for VR pose estimation feedback">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏋️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Browser-side pose detection (TF.js MoveNet) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header id="header">
            <div class="header-left">
                <h1>VR Pose Viewer</h1>
                <span id="connection-badge" class="badge disconnected">Disconnected</span>
            </div>
            <div class="header-right">
                <span id="fps-display" class="stat">0 FPS</span>
                <span id="latency-display" class="stat">0ms</span>
                <span id="camera-status" class="stat" style="color:#888;font-size:0.75rem;">카메라 꺼짐</span>
                <button id="camera-btn" class="btn btn-primary" style="background:rgba(0,229,255,0.12);border:1px solid rgba(0,229,255,0.35);color:#00e5ff;">📷 웹캠 시작</button>
                <button id="connect-btn" class="btn btn-primary">Connect</button>
            </div>
        </header>

        <!-- Main Content -->
        <main id="main-content">
            <!-- Left Panel: Expert Pose -->
            <section id="expert-panel" class="panel">
                <div class="panel-header">
                    <h2>전문가 포즈</h2>
                    <span class="panel-badge">Reference</span>
                </div>
                <div class="canvas-container">
                    <canvas id="expert-canvas" width="480" height="640"></canvas>
                    <div class="canvas-overlay" id="expert-overlay">
                        <span>대기 중...</span>
                    </div>
                </div>
            </section>

            <!-- Center Panel: Score & Feedback -->
            <section id="score-panel" class="panel panel-center">
                <div class="panel-header">
                    <h2>실시간 피드백</h2>
                </div>

                <!-- Score Circle -->
                <div class="score-container">
                    <svg id="score-ring" viewBox="0 0 120 120">
                        <circle class="ring-bg" cx="60" cy="60" r="52"/>
                        <circle class="ring-fill" cx="60" cy="60" r="52" id="score-ring-fill"/>
                    </svg>
                    <div class="score-value" id="score-value">—</div>
                    <div class="score-label">점수</div>
                </div>

                <!-- Rep Counter -->
                <div class="rep-counter">
                    <span id="rep-count">0</span>
                    <span class="rep-label">회</span>
                </div>

                <!-- Feedback Message -->
                <div id="feedback-box" class="feedback-box">
                    <div id="feedback-label" class="feedback-label">서버 연결을 기다리는 중...</div>
                    <div id="knee-angle" class="feedback-detail"></div>
                </div>

                <!-- Muscle Fatigue Map -->
                <div class="fatigue-section">
                    <h3>근육 피로도</h3>
                    <div class="fatigue-grid" id="fatigue-grid">
                        <div class="fatigue-item" data-muscle="left_quad">
                            <div class="fatigue-dot" id="dot-left_quad"></div>
                            <span>좌 대퇴</span>
                        </div>
                        <div class="fatigue-item" data-muscle="right_quad">
                            <div class="fatigue-dot" id="dot-right_quad"></div>
                            <span>우 대퇴</span>
                        </div>
                        <div class="fatigue-item" data-muscle="left_glute">
                            <div class="fatigue-dot" id="dot-left_glute"></div>
                            <span>좌 둔근</span>
                        </div>
                        <div class="fatigue-item" data-muscle="right_glute">
                            <div class="fatigue-dot" id="dot-right_glute"></div>
                            <span>우 둔근</span>
                        </div>
                        <div class="fatigue-item" data-muscle="lower_back">
                            <div class="fatigue-dot" id="dot-lower_back"></div>
                            <span>하부 허리</span>
                        </div>
                        <div class="fatigue-item" data-muscle="abs">
                            <div class="fatigue-dot" id="dot-abs"></div>
                            <span>복근</span>
                        </div>
                    </div>
                </div>

                <!-- Frame Counter -->
                <div class="frame-info">
                    <span id="frame-counter">Frame: —</span>
                    <span id="smoothing-status">Smoothing: —</span>
                </div>
            </section>

            <!-- Right Panel: User Pose -->
            <section id="user-panel" class="panel">
                <div class="panel-header">
                    <h2>사용자 포즈</h2>
                    <span class="panel-badge live">Live</span>
                </div>
                <div class="canvas-container">
                    <canvas id="user-canvas" width="480" height="640"></canvas>
                    <div class="canvas-overlay" id="user-overlay">
                        <span>대기 중...</span>
                    </div>
                </div>
            </section>
        </main>

        <!-- Settings Modal -->
        <div id="settings-bar" class="settings-bar">
            <label>Server:
                <input type="text" id="server-url" value="ws://127.0.0.1:8000/ws/pose" spellcheck="false">
            </label>
            <label>
                <input type="checkbox" id="mirror-mode" checked> Mirror
            </label>
        </div>
    </div>
    <!-- Hidden video element for webcam capture (not shown to user) -->
    <video id="webcam-video" autoplay playsinline muted style="display:none;width:1px;height:1px;position:fixed;top:-1px;left:-1px;"></video>
    <script src="viewer.js?v=7"></script>
</body>
</html>
