<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 900" width="100%" height="100%">
  <defs>
    <!-- CSS for styling the muscle groups dynamically -->
    <style>
      .base-body { fill: #d3d3d3; stroke: #a9a9a9; stroke-width: 2; }
      .muscle { fill: #a9a9a9; opacity: 0.8; transition: fill 0.3s ease, opacity 0.3s ease; }
      /* Classes to trigger fatigue (overload) from Unity or Web UI */
      .fatigue-low { fill: #ffcc00; opacity: 0.9; }
      .fatigue-med { fill: #ff6600; opacity: 0.9; }
      .fatigue-high { fill: #ff0000; opacity: 1.0; }
    </style>
  </defs>

  <!-- BACKGROUND: Base Human Silhouette -->
  <!-- Head -->
  <circle cx="250" cy="100" r="40" class="base-body" />
  <!-- Neck -->
  <rect x="235" y="130" width="30" height="40" rx="10" class="base-body" />
  <!-- Torso Base -->
  <path d="M 180 160 L 320 160 L 300 400 L 200 400 Z" class="base-body" />
  <!-- Left Arm Base -->
  <path d="M 180 160 Q 150 200 130 350 L 160 360 Q 170 250 190 200 Z" class="base-body" />
  <!-- Right Arm Base -->
  <path d="M 320 160 Q 350 200 370 350 L 340 360 Q 330 250 310 200 Z" class="base-body" />
  <!-- Left Leg Base -->
  <path d="M 200 390 L 245 400 L 240 750 L 180 750 Z" class="base-body" />
  <!-- Right Leg Base -->
  <path d="M 300 390 L 255 400 L 260 750 L 320 750 Z" class="base-body" />

  <!-- DYNAMIC MUSCLE GROUPS (Controlled via IDs) -->
  
  <!-- SHOULDERS (Deltoids) -->
  <!-- Left Shoulder -->
  <path id="left_shoulder" d="M 180 160 C 160 160 150 180 150 210 C 170 210 185 190 190 170 Z" class="muscle" />
  <!-- Right Shoulder -->
  <path id="right_shoulder" d="M 320 160 C 340 160 350 180 350 210 C 330 210 315 190 310 170 Z" class="muscle" />

  <!-- CHEST (Pectorals) -->
  <path id="chest" d="M 200 180 C 250 180 250 230 200 240 C 180 240 190 200 200 180 M 300 180 C 250 180 250 230 300 240 C 320 240 310 200 300 180" class="muscle" />

  <!-- ARMS (Biceps) -->
  <!-- Left Bicep -->
  <path id="left_bicep" d="M 150 220 Q 140 260 145 290 Q 165 290 170 230 Z" class="muscle" />
  <!-- Right Bicep -->
  <path id="right_bicep" d="M 350 220 Q 360 260 355 290 Q 335 290 330 230 Z" class="muscle" />

  <!-- FOREARMS -->
  <path id="left_forearm" d="M 140 300 L 130 350 L 155 355 L 160 300 Z" class="muscle" />
  <path id="right_forearm" d="M 360 300 L 370 350 L 345 355 L 340 300 Z" class="muscle" />

  <!-- ABDOMINALS (Core) -->
  <path id="abs" d="M 220 260 L 280 260 L 275 360 L 225 360 Z" class="muscle" />

  <!-- OBLIQUES (Side Abs) -->
  <path id="left_oblique" d="M 195 260 L 215 260 L 220 350 L 195 380 Z" class="muscle" />
  <path id="right_oblique" d="M 305 260 L 285 260 L 280 350 L 305 380 Z" class="muscle" />

  <!-- THIGHS (Quadriceps) -->
  <!-- Left Quad -->
  <path id="left_quad" d="M 190 410 C 170 480 180 550 210 560 C 230 550 240 480 240 415 Z" class="muscle" />
  <!-- Right Quad -->
  <path id="right_quad" d="M 310 410 C 330 480 320 550 290 560 C 270 550 260 480 260 415 Z" class="muscle" />

  <!-- CALVES (Lower Legs Front) -->
  <!-- Left Calf -->
  <path id="left_calf" d="M 210 600 Q 185 650 195 720 L 235 720 Q 240 650 225 600 Z" class="muscle" />
  <!-- Right Calf -->
  <path id="right_calf" d="M 290 600 Q 315 650 305 720 L 265 720 Q 260 650 275 600 Z" class="muscle" />

</svg>
