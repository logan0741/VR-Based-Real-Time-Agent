<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 900" width="100%" height="100%">
  <defs>
    <!-- CSS for styling the muscle groups dynamically -->
    <style>
      .base-body { fill: #d3d3d3; stroke: #a9a9a9; stroke-width: 2; }
      .muscle { fill: #a9a9a9; opacity: 0.8; transition: fill 0.3s ease, opacity 0.3s ease; }
      /* Classes to trigger fatigue (overload) from Unity or Web UI */
      .fatigue-low { fill: #ffcc00; opacity: 0.9; }
      .fatigue-med { fill: #ff6600; opacity: 0.9; }
      .fatigue-high { fill: #ff0000; opacity: 1.0; }
    </style>
  </defs>

  <!-- BACKGROUND: Base Human Silhouette (Back View) -->
  <!-- Head -->
  <circle cx="250" cy="100" r="40" class="base-body" />
  <!-- Neck -->
  <rect x="235" y="130" width="30" height="40" rx="10" class="base-body" />
  <!-- Torso Base -->
  <path d="M 180 160 L 320 160 L 300 400 L 200 400 Z" class="base-body" />
  <!-- Left Arm Base -->
  <path d="M 180 160 Q 150 200 130 350 L 160 360 Q 170 250 190 200 Z" class="base-body" />
  <!-- Right Arm Base -->
  <path d="M 320 160 Q 350 200 370 350 L 340 360 Q 330 250 310 200 Z" class="base-body" />
  <!-- Left Leg Base -->
  <path d="M 200 390 L 245 400 L 240 750 L 180 750 Z" class="base-body" />
  <!-- Right Leg Base -->
  <path d="M 300 390 L 255 400 L 260 750 L 320 750 Z" class="base-body" />

  <!-- DYNAMIC MUSCLE GROUPS (Controlled via IDs) -->
  
  <!-- TRAPEZIUS (Neck / Upper Back) -->
  <path id="traps" d="M 220 130 L 280 130 L 300 170 L 200 170 Z" class="muscle" />

  <!-- LATS (Latissimus Dorsi - Mid Back) -->
  <path id="lats" d="M 195 180 Q 250 230 305 180 L 280 320 L 220 320 Z" class="muscle" />

  <!-- LOWER BACK (Erector Spinae) -->
  <path id="lower_back" d="M 230 330 L 270 330 L 280 390 L 220 390 Z" class="muscle" />

  <!-- TRICEPS (Back of Arms) -->
  <path id="left_tricep" d="M 150 220 Q 140 260 145 290 Q 165 290 170 230 Z" class="muscle" />
  <path id="right_tricep" d="M 350 220 Q 360 260 355 290 Q 335 290 330 230 Z" class="muscle" />

  <!-- GLUTES (Buttocks) -->
  <path id="left_glute" d="M 195 380 Q 220 370 245 390 L 240 450 Q 200 460 185 410 Z" class="muscle" />
  <path id="right_glute" d="M 305 380 Q 280 370 255 390 L 260 450 Q 300 460 315 410 Z" class="muscle" />

  <!-- HAMSTRINGS (Back of Thighs) -->
  <path id="left_hamstring" d="M 185 460 C 180 500 190 550 210 560 C 230 550 240 500 240 460 Z" class="muscle" />
  <path id="right_hamstring" d="M 315 460 C 320 500 310 550 290 560 C 270 550 260 500 260 460 Z" class="muscle" />

  <!-- CALVES (Lower Legs Back) -->
  <path id="left_calf_back" d="M 210 600 Q 185 650 195 720 L 235 720 Q 240 650 225 600 Z" class="muscle" />
  <path id="right_calf_back" d="M 290 600 Q 315 650 305 720 L 265 720 Q 260 650 275 600 Z" class="muscle" />

</svg>
